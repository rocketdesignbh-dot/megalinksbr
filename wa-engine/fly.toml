# Mega Links BR · Motor WhatsApp — Fly.io
# Deploy:
#   fly launch --no-deploy        (cria o app, ajuste o nome abaixo)
#   fly volume create wa_auth -s 1 -r gru
#   fly secrets set WA_ENGINE_TOKEN=$(openssl rand -hex 32)
#   fly deploy
app = "mega-wa-engine"
primary_region = "gru"          # São Paulo

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false     # NÃO deixe dormir: a sessão WhatsApp cai
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "wa_auth"             # volume persistente para ./auth
  destination = "/app/auth"

[checks.health]
  type = "http"
  port = 8080
  method = "GET"
  path = "/health"
  interval = "30s"
  timeout = "5s"
